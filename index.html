<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Manager 餐廳管理系統 - Shared</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --coral: #FF6B6B;
            --orange: #FFA07A;
            --cream: #FFF8F0;
            --gold: #FFD700;
            --dark: #2C3E50;
            --light: #FFFFFF;
            --gray: #95A5A6;
            --green: #2ECC71;
            --red: #E74C3C;
            --shadow: rgba(0, 0, 0, 0.1);
            --text: #2C3E50;
            --bg: #FFF8F0;
        }
        [data-theme="dark"] {
            --cream: #1A1A2E;
            --light: #16213E;
            --text: #EAEAEA;
            --bg: #0F0F1E;
            --shadow: rgba(255, 255, 255, 0.05);
            --gray: #7F8C8D;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, var(--coral), var(--orange));
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
            margin-bottom: 30px;
            border-radius: 0 0 20px 20px;
        }
        header h1 { color: white; font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        header p { color: rgba(255, 255, 255, 0.9); font-size: 1.1rem; }
        .header-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .theme-toggle, .export-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-toggle:hover, .export-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--light);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow);
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 6px 25px var(--shadow); }
        .stat-card i {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--coral), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--coral); font-family: 'Poppins', sans-serif; }
        .stat-card .stat-label { color: var(--gray); font-size: 0.9rem; margin-top: 5px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--light);
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow);
        }
        .tab {
            flex: 1;
            padding: 15px 30px;
            background: transparent;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--gray);
            font-family: 'Poppins', sans-serif;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--coral), var(--orange));
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        .tab:hover:not(.active) { background: rgba(255, 107, 107, 0.1); color: var(--coral); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-section {
            background: var(--light);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            margin-bottom: 30px;
        }
        .form-section h2 {
            color: var(--coral);
            margin-bottom: 25px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 0.95rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid rgba(255, 107, 107, 0.2);
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            background: var(--cream);
            color: var(--text);
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #aaa;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }
        .form-group textarea { resize: vertical; min-height: 100px; }

        /* 5 stars only with half-star support */
       .star-rating {
            display: flex;
            gap: 8px;
            font-size: 2rem;
        }
        .star-rating i {
            cursor: pointer;
            color: #DDD;
            transition: all 0.2s ease;
        }
        .star-rating i.active,
        .star-rating i:hover { color: var(--gold); }

        .submit-btn {
            background: linear-gradient(135deg, var(--coral), var(--orange));
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px auto 0;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255, 107, 107, 0.4);
        }
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid rgba(255, 107, 107, 0.2);
            border-radius: 25px;
            font-size: 1rem;
            background: var(--light);
            color: var(--text);
        }
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--coral);
        }
        .filter-select {
            padding: 12px 20px;
            border: 2px solid rgba(255, 107, 107, 0.2);
            border-radius: 25px;
            font-size: 1rem;
            background: var(--light);
            color: var(--text);
            cursor: pointer;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .restaurant-card {
            background: var(--light);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px var(--shadow);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            overflow: hidden;
        }
        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px var(--shadow);
            border-color: var(--coral);
        }
        .card-header h3 { color: var(--coral); font-size: 1.5rem; margin-bottom: 10px; word-break: break-word; }
        .card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            max-width: 100%;
        }
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            flex-shrink: 1;
        }
        .badge-cuisine { background: linear-gradient(135deg, var(--coral), var(--orange)); color: white; }
        .badge-price { background: rgba(46, 204, 113, 0.2); color: var(--green); }
        .badge-priority.high { background: rgba(231, 76, 60, 0.2); color: var(--red); }
        .badge-priority.medium { background: rgba(255, 160, 122, 0.3); color: var(--orange); }
        .badge-priority.low { background: rgba(46, 204, 113, 0.2); color: var(--green); }
        .badge-region { background: rgba(52, 152, 219, 0.2); color: #2980b9; }
        .card-info p {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
            flex-wrap: wrap;
            word-break: break-all;
            overflow-wrap: break-word;
            hyphens: auto;
        }
        .card-info i { color: var(--coral); width: 20px; flex-shrink: 0; }
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-primary { background: linear-gradient(135deg, var(--coral), var(--orange)); color: white; }
        .btn-secondary { background: rgba(149, 165, 166, 0.2); color: var(--gray); }
        .btn-danger { background: rgba(231, 76, 60, 0.2); color: var(--red); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px var(--shadow); }
        .rating-display { display: flex; align-items: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .rating-stars { color: var(--gold); font-size: 1.2rem; }
        .rating-value { font-weight: 600; color: var(--text); }
        .rating-breakdown {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
            padding: 15px;
            background: var(--cream);
            border-radius: 10px;
        }
        .rating-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            flex-wrap: wrap;
            gap: 8px;
        }
        .rating-item-stars { color: var(--gold); }
        .return-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-block;
            margin-top: 10px;
        }
        .return-badge.definitely { background: rgba(46, 204, 113, 0.2); color: var(--green); }
        .return-badge.maybe { background: rgba(255, 160, 122, 0.3); color: var(--orange); }
        .return-badge.probably-not { background: rgba(231, 76, 60, 0.2); color: var(--red); }
        .return-badge.never { background: rgba(44, 62, 80, 0.2); color: var(--dark); }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; opacity: 0.3; }
        .comment-section {
            margin-top: 15px;
            padding: 0 15px;
            background: var(--cream);
            border-radius: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }
        .comment-section.active {
            max-height: 600px;
            padding: 15px;
            opacity: 1;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--light);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(231, 76, 60, 0.2);
            color: var(--red);
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: var(--red);
            color: white;
            transform: rotate(90deg);
        }
        .success-message {
            position: fixed;
            top: 20px; right: 20px;
            background: linear-gradient(135deg, var(--green), #27AE60);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(46, 204, 113, 0.3);
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 10px;
            animation: slideInRight 0.3s ease;
        }
        .success-message.show { display: flex; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
        footer {
            text-align: center;
            padding: 30px 20px;
            margin-top: 50px;
            border-top: 2px solid rgba(255, 107, 107, 0.1);
            color: var(--gray);
        }

        /* Mobile fixes */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            header { padding: 24px 16px; border-radius: 0 0 16px 16px; }
            header h1 { font-size: 2.1rem; }
            .tabs { flex-direction: column; gap: 8px; padding: 8px; }
            .form-section { padding: 24px; }
            .form-grid { grid-template-columns: 1fr; }
            .submit-btn { width: 100%; justify-content: center; }
            .controls-bar { flex-direction: column; gap: 12px; }
            .filter-select { width: 100%; }
            .cards-grid { grid-template-columns: 1fr; }
            .restaurant-card { padding: 20px; overflow: hidden; }
            .card-badges { flex-wrap: wrap; max-width: 100%; }
            .badge { flex-shrink: 1; white-space: normal; word-break: break-word; }
            .card-info p { word-break: break-all; overflow-wrap: break-word; hyphens: auto; }
            .card-actions { justify-content: center; flex-wrap: wrap; }
            .btn { min-width: 110px; justify-content: center; }
        }
        @media (max-width: 480px) {
            .restaurant-card { padding: 18px; }
            .badge { font-size: 0.75rem; padding: 3px 8px; }
            .btn { min-width: 100px; }
        }
        /* Password prompt */
        #editor-prompt {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            overflow-y: auto;
            padding: 20px;
        }
        #editor-box {
            background: var(--light);
            padding: 28px 24px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
        }
        #editor-box h2 { margin-bottom: 16px; color: var(--coral); font-size: 1.5rem; }
        #editor-box p { margin-bottom: 20px; font-size: 0.95rem; }
        #password-form { display: flex; flex-direction: column; gap: 16px; }
        #editor-password { padding: 12px 14px; border: 2px solid var(--gray); border-radius: 10px; font-size: 1rem; }
        #confirm-btn { padding: 14px; background: var(--coral); color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        #confirm-btn:hover { background: #e55a5a; }
        #skip-link { color: var(--gray); cursor: pointer; text-decoration: underline; font-size: 0.95rem; margin-top: 20px; }
        #skip-link:hover { color: var(--text); }
        @media (max-width: 480px) {
            #editor-box { padding: 24px 18px; width: 94%; }
        }
       .form-section h2 {
    cursor: pointer;
    user-select: none;
    padding: 15px;
    margin: -30px -30px 20px -30px;
    border-radius: 20px 20px 0 0;
    background: linear-gradient(135deg, var(--coral), var(--orange));
    color: white;
}

.form-content {
    transition: all 0.3s ease;
}
    </style>
</head>
<body>

    <!-- Password Prompt -->
    <div id="editor-prompt">
        <div id="editor-box">
            <h2>編輯權限驗證</h2>
            <p>輸入密碼才能新增、編輯、刪除或標記已造訪</p>
            <form id="password-form">
                <input type="password" id="editor-password" placeholder="輸入密碼" autocomplete="off" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px;">
                <button type="submit" id="confirm-btn" style="width:100%; padding:14px; background:var(--coral); color:white; border:none; border-radius:10px; font-size:1rem;">確認</button>
            </form>
            <div id="skip-link" style="margin-top:20px; color:#666; cursor:pointer; text-decoration:underline;">我只想觀看 →</div>
        </div>
    </div>

    <header>
        <h1><i class="fas fa-utensils"></i> Restaurant Manager</h1>
        <p>多人即時共享美食之旅</p>
        <div class="header-controls">
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i> <span>深色模式</span></button>
            <button class="export-btn" onclick="exportData()"><i class="fas fa-download"></i> <span>匯出資料</span></button>
        </div>
        <div style="text-align:center; margin-top:10px; font-size:0.9rem; color:var(--gray);">
            <span id="editor-status">目前模式：觀看模式（只能瀏覽）</span>
        </div>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-card"><i class="fas fa-bookmark"></i><div class="stat-value" id="stat-to-try">0</div><div class="stat-label">想嘗試的餐廳</div></div>
            <div class="stat-card"><i class="fas fa-star"></i><div class="stat-value" id="stat-rated">0</div><div class="stat-label">已評分餐廳</div></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('to-try')"><i class="fas fa-bookmark"></i> 想嘗試的餐廳</button>
            <button class="tab" onclick="switchTab('rating')"><i class="fas fa-star"></i> 餐廳評分</button>
        </div>

        <!-- to-try tab -->
        <div id="to-try-tab" class="tab-content active">
    <div class="form-section">
        <h2 onclick="toggleFormSection(this)" style="cursor:pointer; user-select:none;">
            <i class="fas fa-plus-circle"></i> 新增想嘗試的餐廳 
            <span style="float:right; font-size:1.2rem;">▼</span>
        </h2>
        <div class="form-content" style="display:none;">
            <form id="to-try-form" onsubmit="addToTryRestaurant(event)">
                    <div class="form-grid">
                        <div class="form-group"><label>餐廳名稱 *</label><input type="text" name="name" required placeholder="輸入餐廳名稱"></div>
                        <div class="form-group"><label>料理類型</label><select name="cuisine">
                            <option value="Italian">義式料理</option>
                            <option value="Japanese">日式料理</option>
                            <option value="Chinese">中式料理</option>
                            <option value="French">法式料理</option>
                            <option value="Thai">泰式料理</option>
                            <option value="Korean">韓式料理</option>
                            <option value="American">美式料理</option>
                            <option value="Mexican">墨西哥料理</option>
                            <option value="Indian">印度料理</option>
                            <option value="Fusion">Fusion</option>
                            <option value="Western">Western</option>
                            <option value="Drinks">Drinks</option>
                            <option value="Cafe">咖啡廳</option>
                            <option value="Dessert">甜品</option>
                            <option value="SmallBites">小食</option>
                            <option value="Other">其他</option>
                        </select></div>
                        <div class="form-group"><label>地區</label><select name="region">
                            <option value="Kowloon">九龍</option>
                            <option value="New Territories">新界</option>
                            <option value="Hong Kong Island">港島</option>
                        </select></div>
                        <div class="form-group"><label>地點/地址</label><input type="text" name="location" placeholder="輸入餐廳地址"></div>
                        <div class="form-group"><label>價格範圍</label><select name="price">
                            <option value="$">HK$ - 經濟實惠</option>
                            <option value="$$">HK$$ - 中等價位</option>
                            <option value="$$$">HK$$$ - 較高價位</option>
                            <option value="$$$$">HK$$$$ - 高級餐廳</option>
                        </select></div>
                        <div class="form-group"><label>推薦人</label><input type="text" name="recommended-by" placeholder="誰推薦了這家餐廳？"></div>
                        <div class="form-group"><label>優先級</label><select name="priority">

        function generateStars(n) {
            let html = '';
            const full = Math.floor(n);
            const hasHalf = (n % 1) >= 0.5;
            for (let i = 1; i <= 5; i++) {
                if (i <= full) html += '<i class="fas fa-star"></i>';
                else if (i === full + 1 && hasHalf) html += '<i class="fas fa-star-half-alt"></i>';
                else html += '<i class="far fa-star"></i>';
            }
            return html;
        }

        function updateStars(container, value) {
            const stars = container.querySelectorAll('i');
            stars.forEach(star => {
                const starValue = parseFloat(star.getAttribute('data-value'));
                if (starValue <= value) {
                    star.classList.remove('far');
                    star.classList.add('fas', 'active');
                } else {
                    star.classList.remove('fas', 'active');
                    star.classList.add('far');
                }
            });
        }

        function initializeStarRatings() {
            document.querySelectorAll('.star-rating').forEach(container => {
                container.querySelectorAll('i').forEach(star => {
                    star.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const value = parseFloat(star.getAttribute('data-value'));
                        const hidden = container.parentElement.querySelector('input[type="hidden"]');
                        if (hidden) hidden.value = value;
                        updateStars(container, value);
                    });
                });
            });
        }

        async function addToTryRestaurant(event) {
            event.preventDefault();
            if (!isEditor) {
                alert('只有持有密碼的編輯者可以新增餐廳');
                return;
            }
            const f = event.target;
            const data = {
                name: f.name.value.trim(),
                cuisine: f.cuisine.value,
                region: f.region.value,
                location: f.location.value.trim(),
                price: f.price.value,
                recommendedBy: f['recommended-by'].value.trim(),
                reason: f.reason.value.trim(),
                priority: f.priority.value,
                moreInfo: f['more-info'].value.trim(),
                notes: f.notes.value.trim(),
                dateAdded: editingToTryId ? toTryRestaurants.find(r => r.id === editingToTryId)?.dateAdded || firebase.firestore.FieldValue.serverTimestamp() : firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                if (editingToTryId) {
                    await toTryRef.doc(editingToTryId).update(data);
                    showSuccess('已更新餐廳資訊');
                    editingToTryId = null;
                } else {
                    await toTryRef.add(data);
                    showSuccess('已新增想嘗試的餐廳');
                }
                f.reset();
            } catch (e) { console.error(e); alert('儲存失敗，請檢查 Firebase 設定'); }
        }

                alert('只有持有密碼的編輯者可以新增評分');
                return;
            }
            const f = event.target;
            const data = {
                name: f.name.value.trim(),
                cuisine: f.cuisine.value,
                region: f.region.value,
                location: f.location.value.trim(),
                visitDate: f['visit-date'].value || null,
                pricePaid: f['price-paid'].value,
                wouldReturn: f['would-return'].value,
                dishes: f.dishes.value.trim(),
                review: f.review.value.trim(),
                overallRating: parseFloat(f['overall-rating'].value) || 0,
                foodRating: parseFloat(f['food-rating'].value) || 0,
                serviceRating: parseFloat(f['service-rating'].value) || 0,
                ambianceRating: parseFloat(f['ambiance-rating'].value) || 0,
                valueRating: parseFloat(f['value-rating'].value) || 0,
                dateAdded: editingRatingId ? ratedRestaurants.find(r => r.id === editingRatingId)?.dateAdded || firebase.firestore.FieldValue.serverTimestamp() : firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
                if (editingRatingId) {
                    await ratedRef.doc(editingRatingId).update(data);
                    showSuccess('評分已更新');
                    editingRatingId = null;
                } else {
                    await ratedRef.add(data);
                    showSuccess('已新增餐廳評分');
                }
                f.reset();
                document.querySelectorAll('.star-rating i').forEach(i => { i.classList.remove('fas','active'); i.classList.add('far'); });
                document.querySelectorAll('input[name$="-rating"]').forEach(i => i.value = '0');
            } catch (e) { console.error(e); alert('儲存失敗，請檢查 Firebase 設定'); }
        }

        async function deleteToTry(id) {
            if (!isEditor) {
                alert('只有持有密碼的編輯者可以刪除餐廳');
                return;
            }
            if (confirm('確定刪除這家餐廳？')) {
                await toTryRef.doc(id).delete();
                showSuccess('已刪除');
            }
        }

        async function deleteRating(id) {
            if (!isEditor) {
                alert('只有持有密碼的編輯者可以刪除評分');
                return;
            }
            if (confirm('確定刪除這筆評分？')) {
                await ratedRef.doc(id).delete();
                showSuccess('已刪除');
            }
        }

        function editToTry(id) {
            if (!isEditor) {
                alert('只有持有密碼的編輯者可以編輯');
                return;
            }
            const r = toTryRestaurants.find(x => x.id === id);
            if (!r) return;
            editingToTryId = id;
            const f = document.getElementById('to-try-form');
            f.name.value = r.name;
            f.cuisine.value = r.cuisine;
            f.region.value = r.region || 'Kowloon';
            f.location.value = r.location || '';
            f.price.value = r.price;
            f['recommended-by'].value = r.recommendedBy || '';
            f.reason.value = r.reason || '';
            f.priority.value = r.priority;
            f['more-info'].value = r.moreInfo || '';
            f.notes.value = r.notes || '';
            f.scrollIntoView({behavior:'smooth'});
        }

        function editRating(id) {
            if (!isEditor) {
                alert('只有持有密碼的編輯者可以編輯');
                return;
            }
            const r = ratedRestaurants.find(x => x.id === id);
            if (!r) return;
            editingRatingId = id;
            const f = document.getElementById('rating-form');
            f.name.value = r.name;
            f.cuisine.value = r.cuisine;
            f.region.value = r.region || 'Kowloon';
            f.location.value = r.location || '';
            f['visit-date'].value = r.visitDate || '';
            f['price-paid'].value = r.pricePaid;
            f['would-return'].value = r.wouldReturn;
            f.dishes.value = r.dishes || '';
            f.review.value = r.review || '';
            ['overall','food','service','ambiance','value'].forEach(t => {
                const val = r[`${t}Rating`] || 0;
                f[`${t}-rating`].value = val;
                const container = f.querySelector(`.star-rating[data-rating="${t}"]`);
                if (container) updateStars(container, val);
            });
            f.scrollIntoView({behavior:'smooth'});
        }

        function markAsVisited(id) {
            if (!isEditor) {
                alert('只有持有密碼的編輯者可以標記已造訪');
                return;
            }
            const r = toTryRestaurants.find(x => x.id === id);
            if (!r) return;
            switchTab('rating');
            const f = document.getElementById('rating-form');
            f.name.value = r.name;
            f.cuisine.value = r.cuisine;
            f.region.value = r.region || 'Kowloon';
            f.location.value = r.location || '';
            f['visit-date'].value = new Date().toISOString().split('T')[0];
            f.scrollIntoView({behavior:'smooth'});
            deleteToTry(id);
        }

        // Realtime data loading
        function loadData() {
            toTryRef.orderBy('dateAdded', 'desc').onSnapshot(snapshot => {
                toTryRestaurants = [];
                snapshot.forEach(doc => toTryRestaurants.push({ id: doc.id, ...doc.data() }));
                renderToTryList();
                updateStats();
            });

            ratedRef.orderBy('dateAdded', 'desc').onSnapshot(snapshot => {
                ratedRestaurants = [];
                snapshot.forEach(doc => ratedRestaurants.push({ id: doc.id, ...doc.data() }));
                renderRatingList();
                updateStats();
            });
        }

        function updateStats() {
            document.getElementById('stat-to-try').textContent = toTryRestaurants.length;
            document.getElementById('stat-rated').textContent = ratedRestaurants.length;
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Password handling
            document.getElementById('password-form').addEventListener('submit', handlePasswordSubmit);
            document.getElementById('skip-link').addEventListener('click', skipEditor);

            initializeStarRatings();
            loadData();
        });

        document.getElementById('review-modal').addEventListener('click', e => {
            if (e.target.id === 'review-modal') closeModal();
        });
        function toggleFormSection(header) {
    const content = header.nextElementSibling;   // the .form-content div
    const arrow = header.querySelector('span');
    
    if (content.style.display === 'none' || content.style.display === '') {
        content.style.display = 'block';
        arrow.textContent = '▲';
    } else {
        content.style.display = 'none';
        arrow.textContent = '▼';
    }
}
        function filterToTry() {
    const search = document.getElementById('search-to-try').value.toLowerCase().trim();
    const cuisine = document.getElementById('filter-cuisine-to-try').value;
    const region = document.getElementById('filter-region-to-try').value;

    let list = toTryRestaurants.filter(r => {
        const nameMatch = (r.name || '').toLowerCase().includes(search);
        const locationMatch = (r.location || '').toLowerCase().includes(search);
        const cuisineMatch = !cuisine || r.cuisine === cuisine;
        const regionMatch = !region || r.region === region;
        return (nameMatch || locationMatch) && cuisineMatch && regionMatch;
    });

    renderToTryList(list);
}

function filterRatings() {
    const search = document.getElementById('search-rating').value.toLowerCase().trim();
    const cuisine = document.getElementById('filter-cuisine-rating').value;
    const region = document.getElementById('filter-region-rating').value;
    const minFood = parseFloat(document.getElementById('filter-food-rating').value) || 0;

    let list = ratedRestaurants.filter(r => {
        const nameMatch = (r.name || '').toLowerCase().includes(search);
        const locationMatch = (r.location || '').toLowerCase().includes(search);
        const cuisineMatch = !cuisine || r.cuisine === cuisine;
        const regionMatch = !region || r.region === region;
        const foodMatch = (r.foodRating || 0) >= minFood;
        return (nameMatch || locationMatch) && cuisineMatch && regionMatch && foodMatch;
    });

    renderRatingList(list);
}
async function autoFillFromOpenRice() {
    const urlInput = document.getElementById('more-info-input');
    let url = urlInput.value.trim();

    if (!url) {
        alert('請先輸入 OpenRice 連結');
        return;
    }

    if (!url.includes('openrice.com')) {
        alert('請輸入有效的 OpenRice 連結');
        return;
    }

    // Add https if missing
    if (!url.startsWith('http')) url = 'https://' + url;

    const form = document.getElementById('to-try-form');

    try {
        showSuccess('正在從 OpenRice 抓取資料，請稍候...');

        // Use a free CORS proxy
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
        const response = await fetch(proxyUrl);
        
        if (!response.ok) throw new Error('無法取得頁面');

        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Try to extract restaurant name
        let name = '';
        const title = doc.querySelector('title');
        if (title) {
            name = title.textContent.split('-')[0].trim();
        }
        const h1 = doc.querySelector('h1');
        if (h1 && !name) name = h1.textContent.trim();

        // Try to extract address
        let address = '';
        const addressSelectors = [
            '.address', '[itemprop="address"]', '.restaurant-address', 
            'p:contains("香港")', '.poilocation'
        ];
        
        for (let sel of ['.address', '.poilocation', '[itemprop="address"]', 'p']) {
            const els = doc.querySelectorAll(sel);
            for (let el of els) {
                const text = el.textContent.trim();
                if (text.includes('香港') || text.includes('號') || text.length > 15) {
                    address = text;
                    break;
                }
            }
            if (address) break;
        }

        // Fill the form
        if (name) {
            form.name.value = name;
        }
        if (address) {
            form.location.value = address;
        }

        if (name || address) {
            showSuccess('已自動填入名稱和地址！');
        } else {
            showSuccess('抓到頁面，但無法自動辨識名稱/地址，請手動輸入');
        }

    } catch (err) {
        console.error(err);
        alert('自動填入失敗（OpenRice 可能阻擋抓取）。\n\n請手動輸入餐廳名稱和地址。');
    }
}
